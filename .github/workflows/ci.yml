name: CI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Debug environment
        shell: bash
        run: |
          echo "Runner OS: $RUNNER_OS"
          echo "Git:"
          git --version
          echo "Repo HEAD:"
          git rev-parse HEAD
          echo "Submodules:"
          git submodule status --recursive || true
          echo "JUCE submodule HEAD (if present):"
          if [ -d vendor/JUCE/.git ] || [ -f vendor/JUCE/.git ]; then
            git -C vendor/JUCE rev-parse HEAD
            git -C vendor/JUCE remote -v || true
          else
            echo "vendor/JUCE is missing or not a git checkout"
            ls -la vendor || true
            ls -la vendor/JUCE || true
          fi
          echo "CMake:"
          cmake --version
          echo "Compiler:"
          if [ "$RUNNER_OS" = "Windows" ]; then
            cl 2>&1 | head -n 20 || true
          else
            c++ --version || true
            clang++ --version || true
            g++ --version || true
          fi

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          # JUCE WebBrowser on Linux expects WebKitGTK 4.1 (fallback to 4.0)
          if apt-cache show libwebkit2gtk-4.1-dev >/dev/null 2>&1; then
            webkit_package="libwebkit2gtk-4.1-dev"
          elif apt-cache show libwebkit2gtk-4.0-dev >/dev/null 2>&1; then
            webkit_package="libwebkit2gtk-4.0-dev"
          else
            echo "No supported WebKitGTK dev package found (need 4.1 or 4.0)"
            exit 1
          fi

          sudo apt-get install -y \
            libasound2-dev \
            libx11-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxext-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxrender-dev \
            libgl1-mesa-dev \
            libgtk-3-dev \
            libcurl4-openssl-dev \
            "$webkit_package"

      - name: Configure
        run: cmake -S . -B out/build/release -DCMAKE_BUILD_TYPE=Release

      - name: Build on non-Windows
        if: runner.os != 'Windows'
        run: cmake --build out/build/release --config Release -- -j 2

      - name: Build on Windows
        if: runner.os == 'Windows'
        run: cmake --build out/build/release --config Release

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: out/build/release
