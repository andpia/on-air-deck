site_name: OnAirDeck
site_description: Documentation for OnAirDeck, the JUCE-based web radio engine.
site_url: https://andpia.github.io/on-air-deck/
repo_url: https://github.com/andpia/on-air-deck
repo_name: andpia/on-air-deck

theme:
  name: material
  language: en
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Build and Run: build-and-run.md
  - Web UI: web-ui.md
  - Bridge API: bridge-api.md
  - Docs Workflow: docs-workflow.md

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true

plugins:
  - search